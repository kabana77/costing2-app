services:
  # Laravel Application (PHP 8.2)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: costing2_app
    #restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - costing2_network
    depends_on:
      - mysql
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: costing2_nginx
    #restart: unless-stopped
    ports:
      - "8006:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - costing2_network
    depends_on:
      - app

  # MySQL Database
  mysql:
    #image: mysql:8.0
    image: mariadb:10.5
    container_name: costing2_mysql
    #restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: costing2_db
      MYSQL_USER: costing2_user
      MYSQL_PASSWORD: costing2_password
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - costing2_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    ports:
      - "3310:3306"
    networks:
      - costing2_network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: costing2_redis
    #restart: unless-stopped
    ports:
      - "6384:6379"
    networks:
      - costing2_network


  node:
    image: node:20-alpine
    container_name: costing2_node
    #restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./node_modules:/var/www/html/node_modules
    networks:
      - costing2_network
    command: tail -f /dev/null


  # MailHog for Email Testing
  mailhog:
    image: mailhog/mailhog
    container_name: costing2_mailhog
    #restart: unless-stopped
    ports:
      - "8029:8025"
      - "1029:1025"
    networks:
      - costing2_network

networks:
  costing2_network:
    driver: bridge

volumes:
  costing2_mysql_data:
